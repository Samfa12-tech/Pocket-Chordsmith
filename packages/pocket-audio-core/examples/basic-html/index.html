<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pocket Audio Core Basic HTML Example</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:24px;max-width:760px;background:#0d1020;color:#eef2ff}
    textarea{width:100%;min-height:180px;background:#171b31;color:#eef2ff;border:1px solid #384160;border-radius:8px;padding:12px}
    button{margin:8px 8px 8px 0;padding:10px 14px;border:0;border-radius:8px;background:#64d2ff;color:#061018;font-weight:700}
    pre{background:#171b31;border-radius:8px;padding:12px;overflow:auto}
  </style>
</head>
<body>
  <h1>Pocket Audio Core</h1>
  <p>V0 demo: load the built-in Pocket Chordsmith-style project, play/stop the event scheduler, queue a section, change a stem level, or render a short WAV.</p>
  <textarea id="input">{"projectVersion":16,"title":"Example","key":"C","scale":"major","bpm":104,"songSequence":["A","B"],"sectionBars":{"A":1,"B":1},"gridA":{"kick":[1,0,0,0],"snare":[0,0,1,0],"hat":[1,1,1,1],"bass":[1,0,0,0]},"gridB":{"kick":[1,0,1,0],"snare":[0,0,1,0],"hat":[1,1,1,1],"bass":[1,0,1,0]},"progressionA":[0,4,5,3],"progressionB":[5,3,4,0],"melodyTracksA":[[0,null,2,null]],"guitarEnabled":true,"guitarPatternA":["open","hold","chug","off"]}</textarea>
  <div>
    <button id="load">Load Demo</button>
    <button id="play">Play Events</button>
    <button id="stop">Stop</button>
    <button id="queue">Queue B</button>
    <button id="drums">Drums -6 dB</button>
    <button id="wav">Render WAV</button>
  </div>
  <pre id="out">Ready</pre>
  <script type="module">
    import { PocketAudio, buildPocketAudioTimeline } from "../../src/index.js";
    const audio = new PocketAudio({ diagnostics: true, audio: false });
    const out = document.getElementById("out");
    document.getElementById("load").addEventListener("click", async () => {
      const project = await audio.loadProject(document.getElementById("input").value);
      out.textContent = JSON.stringify({ loaded: project.meta, events: buildPocketAudioTimeline(project).events.length, diagnostics: audio.getDiagnostics() }, null, 2);
    });
    document.getElementById("play").addEventListener("click", async () => {
      await audio.play();
      out.textContent = JSON.stringify(audio.getTransport(), null, 2);
    });
    document.getElementById("stop").addEventListener("click", () => {
      audio.stop();
      out.textContent = JSON.stringify(audio.getTransport(), null, 2);
    });
    document.getElementById("queue").addEventListener("click", () => {
      audio.queueSection("B", { quantize: "bar" });
      out.textContent = JSON.stringify(audio.getTransport(), null, 2);
    });
    document.getElementById("drums").addEventListener("click", () => {
      audio.setStemVolume("drums", 0.5);
      out.textContent = JSON.stringify(audio.project.mixer.stems.drums, null, 2);
    });
    document.getElementById("wav").addEventListener("click", async () => {
      const blob = await audio.renderWav({ sampleRate: 22050 });
      out.textContent = `Rendered WAV: ${Math.round(blob.size / 1024)} KB`;
    });
  </script>
</body>
</html>
