name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Repository hygiene
        shell: bash
        run: |
          test -f addons/pocket_chordsmith/plugin.cfg
          test -f apps/chordsmith-web/index.html
          test -f apps/pocket-dj/index.html
          test -f apps/pocket-daw/package.json
          if find addons apps packages docs -type d -name .git | grep .; then
            echo "Nested git repositories found under canonical source roots."
            exit 1
          fi
          if git ls-files | grep -E '(^|/)(node_modules|dist|target|src-tauri/target)(/|$)|\.(zip|exe|msi)$'; then
            echo "Generated or release artifacts are tracked."
            exit 1
          fi

      - name: Pocket Audio Core
        working-directory: packages/pocket-audio-core
        run: |
          npm install
          npm test
          npm run build

      - name: Pocket Chordsmith web
        working-directory: apps/chordsmith-web
        run: |
          npm install
          npx playwright install --with-deps chromium
          npm run build
          npm run test:e2e
          npm run package:itch

      - name: Pocket DJ
        working-directory: apps/pocket-dj
        run: |
          npm install
          npm run test:e2e

      - name: Pocket DAW
        working-directory: apps/pocket-daw
        run: |
          npm install
          npm test
          npm run build
