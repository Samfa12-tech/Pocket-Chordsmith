name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/chordsmith-web/package-lock.json
            apps/pocket-dj/package-lock.json
            apps/pocket-daw/package-lock.json
            packages/pocket-audio-core/package-lock.json
            packages/pcs-format/package-lock.json

      - name: Install Playwright system dependencies
        run: npx --yes playwright@1.61.1 install-deps chromium

      - name: Repository hygiene
        shell: bash
        run: |
          node scripts/check-repo-organization.mjs

      - name: Install Pocket DAW dependencies for family parity
        working-directory: apps/pocket-daw
        run: npm ci

      - name: Pocket Audio Core
        working-directory: packages/pocket-audio-core
        run: |
          npm ci
          npx playwright install chromium
          npm test
          npm run build
          npm run verify:family-parity

      - name: PCS Format
        working-directory: packages/pcs-format
        run: |
          npm ci
          npm test
          npm run build

      - name: Pocket Chordsmith web
        working-directory: apps/chordsmith-web
        run: |
          npm ci
          npx playwright install chromium
          npm run build
          npm run test:e2e
          npm run package:itch

      - name: Pocket DJ
        working-directory: apps/pocket-dj
        run: |
          npm ci
          npx playwright install chromium
          npm run package:itch
          npm run test:e2e

      - name: Pocket DAW
        working-directory: apps/pocket-daw
        run: |
          npx playwright install chromium
          npm run verify:versions
          npm test
          npm run build
          npm run test:e2e

      - name: Upload browser test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: browser-test-reports-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            apps/chordsmith-web/playwright-report/
            apps/chordsmith-web/test-results/
            apps/pocket-dj/playwright-report/
            apps/pocket-dj/test-results/
            apps/pocket-daw/playwright-report/
            apps/pocket-daw/test-results/

  pocket-daw-windows-native:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/pocket-daw/package-lock.json

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt
          rustup component add clippy

      # Do not cache Cargo build output here. The compiled Tauri target directory
      # was producing ~1 GB immutable caches for each Cargo.lock revision, which
      # quickly exhausted this account's 0.5 GB Actions storage allowance.
      # The Windows job is intentionally allowed to rebuild from source instead.

      - name: Pocket DAW frontend and native checks
        working-directory: apps/pocket-daw
        run: |
          npm ci
          npx playwright install chromium
          npm run verify:versions
          npm test
          npm run build
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          cargo test --manifest-path src-tauri/Cargo.toml
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Upload native check reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pocket-daw-windows-native-reports-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            apps/pocket-daw/test-results/
            apps/pocket-daw/playwright-report/
